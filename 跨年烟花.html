<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Year Fireworks Countdown</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: "Arial", sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            display: block;
            z-index: 0;
        }

        #text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 80px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: 10;
            text-shadow: 0 0 20px red;
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div id="text"></div>
    <script>
        const canvas = document.getElementById("fireworks");
        const ctx = canvas.getContext("2d");
        const textBox = document.getElementById("text");

        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize();
        addEventListener("resize", resize);

        const COLORS = [
            "#ffb3c1", "#ffd6a5", "#fdffb6", "#caffbf",
            "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff", "#ffffff"
        ];
        class Particle {
            constructor(x, y, color, speed, angle, size) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.speed = speed;
                this.angle = angle;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.size = size;
                this.trail = [];
            }
            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > 10) this.trail.shift();

                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += 0.05;

                this.x += this.vx;
                this.y += this.vy;

                this.alpha -= 0.015;
            }
            draw() {
                this.trail.forEach((t, i) => {
                    ctx.globalAlpha = t.alpha * (i / this.trail.length);
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * canvas.height * 0.4 + 80;
                this.speed = 18 + Math.random() * 6;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.exploded = false;

                this.trail = [];
                this.particles = [];
            }
            update() {
                if (!this.exploded) {
                    this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                    if (this.trail.length > 15) this.trail.shift();

                    this.y -= this.speed;
                    this.speed *= 0.98;

                    if (this.y <= this.targetY) this.explode();
                    return;
                }
                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.alpha > 0);
            }
            explode() {
                this.exploded = true;

                const count = 150 + Math.random() * 110;
                const mode = Math.floor(Math.random() * 3);

                for (let i = 0; i < count; i++) {
                    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    let angle = Math.random() * Math.PI * 2;
                    let speed = 2 + Math.random() * 6;

                    if (mode === 1) angle = (i / count) * Math.PI * 2;
                    else if (mode === 2) speed *= Math.random() * 3;

                    const size = 1.5 + Math.random() * 2.5;
                    this.particles.push(new Particle(this.x, this.y, color, speed, angle, size));
                }
            }
            draw() {
                if (!this.exploded) {
                    this.trail.forEach((t, i) => {
                        ctx.globalAlpha = i / this.trail.length;
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    ctx.globalAlpha = 1;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                this.particles.forEach(p => p.draw());
                ctx.globalAlpha = 1;
            }
        }
        let fireworks = [];
        function loop() {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.252) fireworks.push(new Firework());

            fireworks.forEach((fw, i) => {
                fw.update();
                fw.draw();
                if (fw.exploded && fw.particles.length === 0) fireworks.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }
        loop();

        /* ============================
           ======== COUNTDOWN =========
           ============================ */
        const messages = [
            "再见 2025",
            "您好 2026",
            "祝新年快乐！",
            "恭喜发财！",
            "身体健康！",
            "万事如意！",
            "心想事成！",
            "阖家幸福！",
            "大吉大利！",
            "笑口常开！",
            "学习进步！",
            "工作顺利！",
            "财源广进！",
            "岁岁平安！",
            "好运连连！",
            "前程似锦！",
            "",
            "",
            "",
            "",
            "",
            "",
            ""
        ];

        let countdown = 5;
        let step = 0;

        function showText(msg) {
            textBox.style.opacity = 0;
            setTimeout(() => {
                textBox.innerHTML = msg;
                textBox.style.opacity = 1;
            }, 200);
        }

        showText(countdown);

        const timer = setInterval(() => {
            countdown--;

            if (countdown >= 0) {
                showText(countdown);
            } else {
                clearInterval(timer);
                let i = 0;

                function nextMessage() {
                    showText(messages[i]);
                    i++;
                    if (i < messages.length) {
                        setTimeout(nextMessage, 1000);
                    }
                }
                nextMessage();

            }
        }, 1000);
    </script>
</body>
</html>
